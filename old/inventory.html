<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory</title>
  <style>
    :root {
      --primary: #1a6b4a;
      --primary-light: #e8f5ee;
      --primary-mid: #2d9166;
      --accent: #e67e22;
      --accent-light: #fef3e8;
      --danger: #c0392b;
      --danger-light: #fdecea;
      --warning: #d68910;
      --warning-light: #fef9e7;
      --gray-50: #f8f9fa;
      --gray-100: #f1f3f5;
      --gray-200: #e9ecef;
      --gray-400: #adb5bd;
      --gray-600: #6c757d;
      --gray-800: #343a40;
      --gray-900: #212529;
      --radius: 10px;
      --shadow: 0 1px 4px rgba(0,0,0,0.08);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f4f2; color: var(--gray-900); min-height: 100vh; }
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 230px; background: var(--primary); color: #fff; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; }
    .sidebar-brand { padding: 20px 18px 16px; border-bottom: 1px solid rgba(255,255,255,0.12); }
    .sidebar-brand .logo { display: flex; align-items: center; gap: 10px; }
    .sidebar-brand .logo-icon { width: 36px; height: 36px; background: rgba(255,255,255,0.15); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .sidebar-brand h1 { font-size: 13px; font-weight: 600; line-height: 1.3; }
    .sidebar-brand p { font-size: 11px; opacity: 0.7; margin-top: 2px; }
    .sidebar-nav { flex: 1; padding: 12px 8px; overflow-y: auto; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 7px; cursor: pointer; font-size: 13.5px; transition: background 0.15s; color: rgba(255,255,255,0.85); margin-bottom: 2px; }
    .nav-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .nav-item.active { background: rgba(255,255,255,0.18); color: #fff; font-weight: 500; }
    .nav-item .nav-icon { font-size: 17px; width: 20px; text-align: center; }
    .sidebar-footer { padding: 14px; border-top: 1px solid rgba(255,255,255,0.12); font-size: 11px; opacity: 0.6; }
    .main { margin-left: 230px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .topbar { background: #fff; padding: 0 28px; height: 56px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--gray-200); position: sticky; top: 0; z-index: 50; }
    .topbar-title { font-size: 16px; font-weight: 600; color: var(--gray-800); }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .content { padding: 24px 28px; flex: 1; }
    .card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; }
    .card-title { font-size: 14px; font-weight: 600; color: var(--gray-800); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    th { background: var(--gray-50); color: var(--gray-600); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.4px; padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--gray-200); white-space: nowrap; }
    td { padding: 11px 14px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--gray-50); }
    .badge { display: inline-block; padding: 3px 9px; border-radius: 12px; font-size: 11.5px; font-weight: 600; }
    .badge-food { background: #e3f4e8; color: #1e6b31; }
    .badge-medicine { background: #eae3f4; color: #4a1e6b; }
    .badge-supplies { background: #e3eef4; color: #1e4a6b; }
    .badge-ok { background: var(--primary-light); color: var(--primary); }
    .badge-low { background: var(--warning-light); color: var(--warning); }
    .badge-expired { background: var(--danger-light); color: var(--danger); }
    .badge-expiring { background: var(--warning-light); color: var(--warning); }
    .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .toolbar-left { flex: 1; display: flex; gap: 10px; flex-wrap: wrap; }
    .search-box { position: relative; }
    .search-box input { padding-left: 32px; width: 220px; }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--gray-400); font-size: 14px; pointer-events: none; }
    select.filter-select { width: auto; padding: 8px 11px; }
    input, select, textarea { padding: 8px 11px; border: 1px solid var(--gray-200); border-radius: 7px; font-size: 13.5px; font-family: inherit; color: var(--gray-900); background: #fff; outline: none; transition: border-color 0.15s; }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,107,74,0.08); }
    .btn { padding: 8px 16px; border-radius: 7px; border: none; cursor: pointer; font-size: 13.5px; font-weight: 500; font-family: inherit; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #165a3d; }
    .btn-secondary { background: var(--gray-100); color: var(--gray-800); }
    .btn-secondary:hover { background: var(--gray-200); }
    .btn-danger { background: var(--danger-light); color: var(--danger); }
    .btn-danger:hover { background: #fbd0ce; }
    .btn-sm { padding: 5px 11px; font-size: 12px; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 12px; box-shadow: var(--shadow-md); padding: 24px; width: 520px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .modal-title { font-size: 16px; font-weight: 600; }
    .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--gray-600); line-height: 1; padding: 0; }
    .modal-close:hover { color: var(--gray-900); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 12.5px; font-weight: 500; color: var(--gray-600); }
    textarea { resize: vertical; min-height: 72px; width: 100%; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    .progress-wrap { display: flex; align-items: center; gap: 8px; }
    .progress-bar { flex: 1; height: 6px; background: var(--gray-200); border-radius: 3px; overflow: hidden; min-width: 60px; }
    .progress-fill { height: 100%; border-radius: 3px; background: var(--primary); }
    .progress-fill.low { background: var(--warning); }
    .progress-fill.critical { background: var(--danger); }
    .progress-num { font-size: 12px; color: var(--gray-600); white-space: nowrap; }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--gray-600); }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 10px; }
    #toast { position: fixed; bottom: 24px; right: 24px; background: var(--gray-900); color: #fff; padding: 12px 18px; border-radius: 8px; font-size: 13.5px; z-index: 999; transform: translateY(80px); opacity: 0; transition: all 0.25s; }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { background: var(--primary); }
    #toast.error { background: var(--danger); }
    @media (max-width: 900px) {
      .sidebar { width: 58px; }
      .sidebar .nav-item span, .sidebar-brand h1, .sidebar-brand p, .sidebar-footer { display: none; }
      .main { margin-left: 58px; }
    }
  </style>
</head>
<body>

<div class="app">
  <div id="sidebar-container"></div>
  <main class="main">
    <div class="topbar">
      <div class="topbar-title">Inventory</div>
      <div class="topbar-right">
        <span style="font-size:13px;color:var(--gray-600);">Admin</span>
      </div>
    </div>

    <div class="content">
      <div class="toolbar">
        <div class="toolbar-left">
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder="Search items..." id="inv-search" oninput="filterInventory()">
          </div>
          <select class="filter-select" id="inv-cat-filter" onchange="filterInventory()">
            <option value="">All Categories</option>
            <option value="Food">Food</option>
            <option value="Medicine">Medicine</option>
            <option value="Supplies">Supplies</option>
          </select>
          <select class="filter-select" id="inv-shelter-filter" onchange="filterInventory()">
            <option value="">All Shelters</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="openAddItem()">+ Add Item</button>
      </div>
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Item</th><th>Category</th><th>Shelter</th><th>Stock Level</th>
                <th>Unit</th><th>Expiry</th><th>Status</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="inv-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Add/Edit Item Modal -->
<div class="modal-overlay" id="modal-item">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="item-modal-title">Add Item</h2>
      <button class="modal-close" onclick="closeModal('modal-item')">×</button>
    </div>
    <div class="form-grid">
      <input type="hidden" id="item-id">
      <div class="form-group full"><label>Item Name *</label><input type="text" id="item-name" placeholder="e.g. Dog Food (Dry)"></div>
      <div class="form-group"><label>Category *</label>
        <select id="item-category">
          <option value="Food">Food</option>
          <option value="Medicine">Medicine</option>
          <option value="Supplies">Supplies</option>
        </select>
      </div>
      <div class="form-group"><label>Unit *</label><input type="text" id="item-unit" placeholder="kg, pcs, btl..."></div>
      <div class="form-group"><label>Current Quantity</label><input type="number" id="item-qty" value="0" min="0" step="0.1"></div>
      <div class="form-group"><label>Minimum Stock Level</label><input type="number" id="item-min" value="10" min="0" step="0.1"></div>
      <div class="form-group"><label>Expiry Date</label><input type="date" id="item-expiry"></div>
      <div class="form-group"><label>Shelter</label>
        <select id="item-shelter"><option value="">Select shelter...</option></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-item')">Cancel</button>
      <button class="btn btn-primary" onclick="saveItem()">Save Item</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = 'http://localhost:5000/api';
let allItems = [], allShelters = [];

fetch('sidebar.html')
  .then(r => r.text())
  .then(html => {
    document.getElementById('sidebar-container').innerHTML = html;
    document.querySelectorAll('.nav-item')[1].classList.add('active');
  });

function toast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => t.className = '', 2500);
}

function fmt(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-PH', {month:'short',day:'numeric',year:'numeric'});
}

async function api(path, method='GET', body=null) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  return r.json();
}

function stockBadge(qty, min) {
  const pct = min > 0 ? qty / min : 1;
  if (pct <= 0) return `<span class="badge badge-expired">Out of Stock</span>`;
  if (pct <= 1) return `<span class="badge badge-low">Low Stock</span>`;
  return `<span class="badge badge-ok">In Stock</span>`;
}

function expiryBadge(d) {
  if (!d) return '—';
  const today = new Date(); today.setHours(0,0,0,0);
  const exp = new Date(d);
  const diff = Math.floor((exp - today) / 86400000);
  if (diff < 0) return `<span class="badge badge-expired">Expired</span>`;
  if (diff <= 30) return `<span class="badge badge-expiring">Expires in ${diff}d</span>`;
  return `<span style="font-size:12.5px;color:var(--gray-600)">${fmt(d)}</span>`;
}

function progressBar(qty, min) {
  const max = Math.max(qty, min * 2, 1);
  const pct = Math.min((qty / max) * 100, 100);
  const cls = qty <= min ? (qty <= min * 0.5 ? 'critical' : 'low') : '';
  return `<div class="progress-wrap"><div class="progress-bar"><div class="progress-fill ${cls}" style="width:${pct}%"></div></div><span class="progress-num">${qty}/${min}</span></div>`;
}

async function loadInventory() {
  [allItems, allShelters] = await Promise.all([api('/items'), api('/shelters')]);
  populateShelterFilters();
  renderInventory(allItems);
}

function renderInventory(items) {
  document.getElementById('inv-tbody').innerHTML = items.length ? items.map(i => `
    <tr>
      <td><strong style="font-size:13.5px">${i.name}</strong></td>
      <td><span class="badge badge-${i.category.toLowerCase()}">${i.category}</span></td>
      <td style="font-size:13px;color:var(--gray-600)">${i.shelter_name || '—'}</td>
      <td>${progressBar(i.quantity, i.min_stock)}</td>
      <td style="font-size:13px">${i.unit}</td>
      <td>${expiryBadge(i.expiry_date)}</td>
      <td>${stockBadge(i.quantity, i.min_stock)}</td>
      <td>
        <button class="btn btn-sm btn-secondary" onclick="editItem(${i.item_id})">Edit</button>
        <button class="btn btn-sm btn-danger" onclick="deleteItem(${i.item_id},'${i.name}')">Del</button>
      </td>
    </tr>
  `).join('') : '<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">📦</div><p>No items found</p></div></td></tr>';
}

function filterInventory() {
  const q = document.getElementById('inv-search').value.toLowerCase();
  const cat = document.getElementById('inv-cat-filter').value;
  const shel = document.getElementById('inv-shelter-filter').value;
  renderInventory(allItems.filter(i =>
    (!q || i.name.toLowerCase().includes(q)) &&
    (!cat || i.category === cat) &&
    (!shel || String(i.shelter_id) === shel)
  ));
}

function populateShelterFilters() {
  ['inv-shelter-filter'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '<option value="">All Shelters</option>' +
      allShelters.map(s => `<option value="${s.shelter_id}">${s.name}</option>`).join('');
  });
  ['item-shelter'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '<option value="">Select shelter...</option>' +
      allShelters.map(s => `<option value="${s.shelter_id}">${s.name}</option>`).join('');
  });
}

function openAddItem() {
  document.getElementById('item-modal-title').textContent = 'Add Item';
  document.getElementById('item-id').value = '';
  ['item-name','item-unit'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('item-qty').value = 0;
  document.getElementById('item-min').value = 10;
  document.getElementById('item-expiry').value = '';
  document.getElementById('item-category').value = 'Food';
  populateShelterFilters();
  document.getElementById('modal-item').classList.add('open');
}

async function editItem(id) {
  const item = allItems.find(i => i.item_id === id);
  if (!item) return;
  document.getElementById('item-modal-title').textContent = 'Edit Item';
  document.getElementById('item-id').value = id;
  document.getElementById('item-name').value = item.name;
  document.getElementById('item-category').value = item.category;
  document.getElementById('item-unit').value = item.unit;
  document.getElementById('item-qty').value = item.quantity;
  document.getElementById('item-min').value = item.min_stock;
  document.getElementById('item-expiry').value = item.expiry_date || '';
  populateShelterFilters();
  document.getElementById('item-shelter').value = item.shelter_id || '';
  document.getElementById('modal-item').classList.add('open');
}

async function saveItem() {
  const id = document.getElementById('item-id').value;
  const data = {
    name: document.getElementById('item-name').value.trim(),
    category: document.getElementById('item-category').value,
    unit: document.getElementById('item-unit').value.trim(),
    quantity: parseFloat(document.getElementById('item-qty').value) || 0,
    min_stock: parseFloat(document.getElementById('item-min').value) || 10,
    expiry_date: document.getElementById('item-expiry').value || null,
    shelter_id: document.getElementById('item-shelter').value || null
  };
  if (!data.name || !data.unit) return toast('Fill in required fields', 'error');
  if (id) await api('/items/' + id, 'PUT', data);
  else await api('/items', 'POST', data);
  closeModal('modal-item');
  toast(id ? 'Item updated' : 'Item added');
  loadInventory();
}

async function deleteItem(id, name) {
  if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
  await api('/items/' + id, 'DELETE');
  toast('Item deleted');
  loadInventory();
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

loadInventory();
</script>
</body>
</html>
